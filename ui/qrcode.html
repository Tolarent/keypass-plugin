<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>KeyPass — QR Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08080f; color: #e8e8ed;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 40px 24px;
    }
    .logo { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
    .logo .gold { color: #d4af37; }
    .card {
      background: #0f0f18; border: 1px solid #1c1c2e;
      border-radius: 16px; padding: 32px; text-align: center;
      max-width: 420px; width: 100%;
    }
    .room { font-size: 32px; font-weight: 700; color: #d4af37; margin-bottom: 4px; }
    .guest { font-size: 16px; color: #8e8ea0; margin-bottom: 24px; }
    .qr-img { width: 240px; height: 240px; border-radius: 12px; display: block; margin: 0 auto 24px; }
    .dates { display: flex; gap: 32px; justify-content: center; margin-bottom: 24px; }
    .date-item { text-align: center; }
    .date-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #5a5a6e; margin-bottom: 4px; }
    .date-val { font-size: 14px; font-weight: 600; }
    .instruction { font-size: 13px; color: #6e6e82; line-height: 1.5; }
    .instruction strong { color: #e8e8ed; }
    .close-btn {
      margin-top: 24px; background: transparent; border: 1px solid #252538;
      color: #6e6e82; padding: 10px 24px; border-radius: 10px;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .close-btn:hover { border-color: #d4af37; color: #d4af37; }
  </style>
</head>
<body>
  <div class="logo">Key<span class="gold">Pass</span></div>
  <div class="card">
    <div class="room" id="roomNum">—</div>
    <div class="guest" id="guestNom">Chargement…</div>
    <img class="qr-img" id="qrImg" alt="QR Code">
    <div class="dates">
      <div class="date-item">
        <div class="date-label">Arrivée</div>
        <div class="date-val" id="checkin">—</div>
      </div>
      <div class="date-item">
        <div class="date-label">Départ</div>
        <div class="date-val" id="checkout">—</div>
      </div>
    </div>
    <p class="instruction">
      Le client scanne ce QR code avec son <strong>iPhone</strong>.<br>
      La carte s'ajoute automatiquement dans <strong>Apple Wallet</strong>.
    </p>
    <button class="close-btn" onclick="window.close()">Fermer</button>
  </div>

  <script>
    window.keypass.on('qr-data', ({ qrBase64, key }) => {
      if (qrBase64) document.getElementById('qrImg').src = 'data:image/png;base64,' + qrBase64;
      if (key) {
        document.getElementById('roomNum').textContent  = 'Chambre ' + (key.room_id || '—');
        document.getElementById('guestNom').textContent = key.guest_name || '—';
        document.getElementById('checkin').textContent  = key.checkin   || '—';
        document.getElementById('checkout').textContent = key.checkout  || '—';
      }
    });
  </script>
</body>
</html>
